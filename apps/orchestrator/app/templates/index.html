<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local LLM Chat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5RLHO8HZT/Knuj8Gfq2TDE2doLGS0V3U76poMiJGnB9NxKBJag4" crossorigin="anonymous" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <button id="new-chat-btn" title="新しい会話">＋ New Chat</button>
      </div>
      <div id="conv-list"></div>
    </aside>

    <!-- Main chat area -->
    <main id="chat-area">
      <div id="messages" role="log" aria-live="polite">
        <div id="empty-state">
          <div class="empty-icon">💬</div>
          <p>メッセージを送信して会話を始めましょう</p>
        </div>
      </div>

      <div id="input-area">
        <div id="model-selector">
          <select id="model-select" aria-label="モデル選択">
            <option value="">読み込み中…</option>
          </select>
        </div>
        <textarea
          id="msg-input"
          placeholder="メッセージを入力… (Shift+Enter で改行)"
          rows="1"
          aria-label="メッセージ"
        ></textarea>
        <button id="send-btn" aria-label="送信">
          <span id="send-label">送信</span>
          <span id="send-spinner" class="spinner" hidden></span>
        </button>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@14.1.4/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
  <script src="/static/app.js"></script>
</body>
</html>
