<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local LLM Chat</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <button id="new-chat-btn" title="新しい会話">＋ New Chat</button>
      </div>
      <div id="conv-list"></div>
    </aside>

    <!-- Main chat area -->
    <main id="chat-area">
      <div id="messages" role="log" aria-live="polite">
        <div id="empty-state">
          <div class="empty-icon">💬</div>
          <p>メッセージを送信して会話を始めましょう</p>
        </div>
      </div>

      <div id="input-area">
        <div id="model-selector">
          <select id="model-select" aria-label="モデル選択">
            <option value="">読み込み中…</option>
          </select>
        </div>
        <textarea
          id="msg-input"
          placeholder="メッセージを入力… (Shift+Enter で改行)"
          rows="1"
          aria-label="メッセージ"
        ></textarea>
        <button id="send-btn" aria-label="送信">
          <span id="send-label">送信</span>
          <span id="send-spinner" class="spinner" hidden></span>
        </button>
      </div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
